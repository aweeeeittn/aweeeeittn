<script>
const bannerImg = document.getElementById("bannerImg");

function showBanner() {
if (bannerImg.complete && bannerImg.naturalHeight > 0) {
bannerImg.classList.add("loaded");
} else {
bannerImg.onload = () => bannerImg.classList.add("loaded");
bannerImg.onerror = () => {
bannerImg.style.opacity = "0";
};
}
}

function checkSkipLoading() {
return location.search.indexOf('skip_loading=1') > -1;
}

const loadingDom = document.getElementById("loading");
const pageDom = document.getElementById("pageContent");
const progressText = document.getElementById("progressText");

if (checkSkipLoading()) {
loadingDom.classList.add("hide");
pageDom.classList.add("show");
showBanner();
} else {
let progress = 0;
const progressTimer = setInterval(()=>{
progress += Math.floor(Math.random()*8)+1;
if(progress >= 100){
progress = 100;
clearInterval(progressTimer);
}
progressText.innerText = `加载中 ${progress}%`;
},150);

setTimeout(()=>{
loadingDom.classList.add("hide");
pageDom.classList.add("show");
showBanner();
},2200);
}

const modal = document.getElementById("commentModal");
const commentInput = document.getElementById("commentInput");
const commentList = document.getElementById("commentList");
const submitBtn = document.getElementById("submitComment");
const closeBtn = document.getElementById("closeModal");
let currentCardId = "";

function updateBeijingTime() {
const now = new Date();
const h = String(now.getHours()).padStart(2, "0");
const m = String(now.getMinutes()).padStart(2, "0");
const s = String(now.getSeconds()).padStart(2, "0");
const y = now.getFullYear();
const mo = String(now.getMonth() + 1).padStart(2, "0");
const d = String(now.getDate()).padStart(2, "0");
document.getElementById("beijingTime").innerText = `北京时间 ${h}:${m}:${s}`;
document.getElementById("beijingDate").innerText = `${y}年${mo}月${d}`;
}
updateBeijingTime();
setInterval(updateBeijingTime, 1000);

const starBox = document.getElementById("starBox");
function createStar(type) {
const star = document.createElement("div");
star.className = "star-particle " + type;
const size = type === "star-slow" ? Math.random() * 2 + 1 : Math.random() * 1.2;
star.style.width = size + "px";
star.style.height = size + "px";
star.style.left = Math.random() * 100 + "%";
star.style.top = Math.random() * 30 + 70 + "%";
star.style.animationDelay = Math.random() * (type === "star-slow" ? 15 : 8) + "s";
starBox.appendChild(star);
}
for(let i=0;i<6;i++) createStar("star-slow");
for(let i=0;i<10;i++) createStar("star-fast");

const tags = document.querySelectorAll(".tag");
const pages = document.querySelectorAll(".page");
tags.forEach(tag=>{
tag.onclick = ()=>{
tags.forEach(t=>t.classList.remove("active"));
tag.classList.add("active");
const target = tag.dataset.page;
pages.forEach(p=>{
p.classList.remove("active");
if(p.id === target) p.classList.add("active");
});
};
});

const wrap = document.getElementById('carouselWrap');
const stage = document.getElementById('carouselStage');
const item1 = document.getElementById('item1');
const item2 = document.getElementById('item2');
const item3 = document.getElementById('item3');
const items = [item1, item2, item3];
const total = items.length;
let currentIndex = 1;
let startX = 0;
let moveX = 0;
let isDragging = false;
let dragTime = 0;
const SWIPE_THRESHOLD = 45;

function renderIndex(idx) {
items.forEach(el => {
el.classList.remove("item-center","item-left","item-right");
el.style.pointerEvents = "none";
});
const prev = (idx - 1 + total) % total;
const next = (idx + 1) % total;
items[idx].classList.add("item-center");
items[idx].style.pointerEvents = "auto";
items[prev].classList.add("item-left");
items[next].classList.add("item-right");
}
renderIndex(currentIndex);

setInterval(()=>{
stage.style.transition = "var(--transition-snap)";
currentIndex = (currentIndex + 1) % total;
renderIndex(currentIndex);
},5000);

wrap.addEventListener('touchstart', (e)=>{
isDragging = true;
startX = e.touches[0].clientX;
dragTime = Date.now();
moveX = 0;
stage.style.transition = "none";
});
wrap.addEventListener('touchmove', (e)=>{
if(!isDragging) return;
moveX = e.touches[0].clientX - startX;
stage.style.transform = `translateX(${moveX * 0.4}px)`;
});
wrap.addEventListener('touchend', ()=>{
if(!isDragging) return;
const dragDuration = Date.now() - dragTime;
stage.style.transition = "var(--transition-snap)";
stage.style.transform = "translateX(0)";
if(Math.abs(moveX) < 30 && dragDuration < 120){
isDragging = false; moveX = 0; startX = 0; dragTime=0;
return;
}
if(moveX > SWIPE_THRESHOLD) {
currentIndex = (currentIndex - 1 + total) % total;
} else if(moveX < -SWIPE_THRESHOLD) {
currentIndex = (currentIndex + 1) % total;
}
renderIndex(currentIndex);
isDragging = false; moveX = 0; startX = 0; dragTime=0;
});

wrap.addEventListener('mousedown', e=>{
isDragging = true;
startX = e.clientX;
dragTime = Date.now();
moveX = 0;
stage.style.transition = "none";
wrap.style.cursor = "grabbing";
});
document.addEventListener('mousemove', e=>{
if(!isDragging) return;
moveX = e.clientX - startX;
stage.style.transform = `translateX(${moveX * 0.4}px)`;
});
document.addEventListener('mouseup', ()=>{
if(!isDragging) return;
const dragDuration = Date.now() - dragTime;
stage.style.transition = "var(--transition-snap)";
stage.style.transform = "translateX(0)";
wrap.style.cursor = "grab";
if(Math.abs(moveX) < 30 && dragDuration < 120){
isDragging = false; moveX = 0; startX = 0; dragTime=0;
return;
}
if(moveX > SWIPE_THRESHOLD) {
currentIndex = (currentIndex - 1 + total) % total;
} else if(moveX < -SWIPE_THRESHOLD) {
currentIndex = (currentIndex + 1) % total;
}
renderIndex(currentIndex);
isDragging = false; moveX = 0; startX = 0; dragTime=0;
});

function getLikeData(){
const data = localStorage.getItem("cardLikeData");
return data ? JSON.parse(data) : {};
}
function saveLikeData(obj){
localStorage.setItem("cardLikeData", JSON.stringify(obj));
}
function initLikeCount(){
const likeData = getLikeData();
document.querySelectorAll(".moment-card").forEach(card=>{
const cid = card.dataset.cardId;
const countDom = card.querySelector(".like-count");
const liked = localStorage.getItem(`liked_${cid}`);
if(likeData[cid]) countDom.innerText = likeData[cid];
if(liked === "1") card.querySelector(".like-btn").style.color="#ff5873";
});
}
document.querySelectorAll(".like-btn").forEach(btn=>{
btn.onclick = function(){
const card = this.closest(".moment-card");
const cid = card.dataset.cardId;
const key = `liked_${cid}`;
const likeData = getLikeData();
if(!likeData[cid]) likeData[cid] = 0;
if(localStorage.getItem(key) === "1"){
localStorage.removeItem(key);
likeData[cid]--;
this.style.color="#777";
}else{
localStorage.setItem(key,"1");
likeData[cid]++;
this.style.color="#ff5873";
}
saveLikeData(likeData);
this.querySelector(".like-count").innerText = likeData[cid];
};
});

function getCommentData(){
const d = localStorage.getItem("cardCommentData");
return d ? JSON.parse(d) : {};
}
function saveCommentData(obj){
localStorage.setItem("cardCommentData", JSON.stringify(obj));
}
function renderComments(cid){
const all = getCommentData();
const list = all[cid] || [];
commentList.innerHTML = "";
list.forEach((txt,i)=>{
const div = document.createElement("div");
div.className = "comment-item";
div.innerHTML = `<span>${txt}</span><span class="del-comment" data-i="${i}">删除</span>`;
commentList.appendChild(div);
});
const card = document.querySelector(`[data-card-id="${cid}"]`);
if(card) card.querySelector(".comment-count").innerText = list.length;
document.querySelectorAll(".del-comment").forEach(del=>{
del.onclick = function(){
const idx = Number(this.dataset.i);
const all = getCommentData();
all[cid].splice(idx,1);
saveCommentData(all);
renderComments(cid);
};
});
}
document.querySelectorAll(".comment-btn").forEach(btn=>{
btn.onclick = function(){
currentCardId = this.closest(".moment-card").dataset.cardId;
commentInput.value = "";
renderComments(currentCardId);
modal.style.display = "flex";
};
});
closeBtn.onclick = ()=> modal.style.display = "none";
submitBtn.onclick = function(){
const txt = commentInput.value.trim();
if(!txt) return alert("请输入评论");
const all = getCommentData();
if(!all[currentCardId]) all[currentCardId] = [];
all[currentCardId].push(txt);
saveCommentData(all);
renderComments(currentCardId);
commentInput.value = "";
};
initLikeCount();
</script>
